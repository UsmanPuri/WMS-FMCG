module.exports = "<button class=\"open-button\" (click)=\"openForm()\">Chat</button>\r\n\r\n<div class=\"chat-popup\" id=\"myForm\">\r\n  <form name=\"formGroup\" [formGroup]=\"formGroup\" (submit)=\"chatSubmit(formGroup.value);\" class=\"form-container\">\r\n    <h3>Chat Script</h3>\r\n    <div class=\"div-chat-script\">\r\n      <p *ngFor=\"let message of messages\">\r\n        <b>{{ message.UserName }}</b>: {{ message.TextMessage }}\r\n      </p>\r\n    </div>\r\n    \r\n    <textarea formControlName=\"textMessage\" placeholder=\"Type message..\" name=\"msg\" required></textarea>\r\n\r\n    <button type=\"submit\" class=\"btn\">Send</button>\r\n    <button type=\"button\" class=\"btn cancel\" (click)=\"closeForm()\">Close</button>\r\n  </form>\r\n</div>"
