 <body class="login-aml">
    <div class="login-box">
   
        <div class="login-logo" style="margin-bottom:0px">
          <img id="logo" src="assets/images/wms-logo.png" height="170" width="360" style="background-color: white;">
        </div>
        <!-- /.login-logo -->
        <div class="login-box-body">
           
          <h4 class="login-box-msg"><strong><u> Start Your Session</u></strong></h4>
      
          <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="login(formGroup.value)">
            <div class="form-group has-feedback">
              <input type="text" formControlName="email" class="form-control" placeholder="Email">
              <span class="glyphicon glyphicon-envelope form-control-feedback"></span>
            </div>
            <div class="form-group has-feedback">
              <input type="password" formControlName="password" class="form-control" placeholder="Password">
              <span class="glyphicon glyphicon-lock form-control-feedback"></span>
            </div>
            <div class="row">
              <div class="col-xs-8">
                <!-- <button type="button" class="btn btn-link myBtnLink -danger text-decoration-none" 
                (click)="signup()">Sign Up</button> -->
              </div>
              <!-- /.col -->
              <div class="col-xs-4">
                <button type="submit" [disabled]="formGroup.invalid" class="btn btn-primary btn-block btn-flat">L O G I N</button>
              </div>
              <!-- /.col -->
            </div>
          </form>
      
          <div class="social-auth-links text-center">
            <!-- <p>- OR -</p>
            <a href="#" class="btn btn-block btn-social btn-facebook btn-flat"><i class="fa fa-facebook"></i> Sign in using
              Facebook</a>
            <a href="#" class="btn btn-block btn-social btn-google btn-flat"><i class="fa fa-google-plus"></i> Sign in using
              Google+</a> -->
          </div>
          <!-- /.social-auth-links -->
      
          <!-- <a href="#">I forgot my password</a><br>
          <a href="#" class="text-center">Register a new membership</a> -->
      
        </div>
        <!-- /.login-box-body -->
      </div>
 </body>
