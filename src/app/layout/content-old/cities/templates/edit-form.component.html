
<section class="content">
    <section class="content-header">
        <h1>
          CITY EDIT
        </h1>
        <ol class="breadcrumb">
          <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
          <li><a routerLink="[this.routesList.CITY_LISTING]">Cities</a></li>
          <li class="active">Create</li>
        </ol>
      </section>
    <div col-md-12>
      <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="updateCity(formGroup.value)">
        <div class="box box-primary">
          <div class="box-header with-border">
            <div class="col-md-12">
              <div class="col-md-6">
                <!-- <h3 class="box-title">Quick Example</h3> -->
                <button type="button" (click)="redirectToCityList()" class="btn-wms">City Listing</button>
              </div>
              <div class="col-md-6">
                <div class="pull-right">
                  <div class="col-md-6 toggle-label ">
                    <span *ngIf="status == true">
                      <b>Active</b>
                    </span>
                    <span *ngIf="status == false">
                      <b>InActive</b>
                    </span>
                  </div>
                  <div class="col-md-6">
                    <ui-switch switchColor="#fcfcfc" [checked]="status == true" (change)="onStatusChange($event)"></ui-switch>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="box-body">
            <div class="col-md-12">

                <div class="col-md-4">
                    <div class="form-group">
                      <label>Province</label>
                     
                      <ng-multiselect-dropdown  
                      [placeholder]="'Select one'"
                      [data]="provencesKeyPair"
                      [settings]="provinceDropdownSettings"
                      formControlName="ProvinceId"
                      [(ngModel)]="selectedProvinceInfo"
                      (onSelect)="getRegionKeyPair($event, true)">
                    </ng-multiselect-dropdown>
                      <span class="help-block" *ngIf="formGroup.controls.ProvinceId.invalid">
                        {{getErrorMessage('ProvinceId')}}
                      </span>
                    </div>
                  </div>
                <!-- <div class="col-md-4">
                    <div class="form-group">
                      <label>Province</label>
                      <select (change)="getRegionKeyPair($event.target.value)" formControlName="ProvinceId" class="form-control">
                        <option selected value="">Select one</option>
                        <option *ngFor="let prov of provencesKeyPair" [value]="prov.Value">
                          {{prov.Text}}
                        </option>
                      </select>
                      <span class="help-block" *ngIf="formGroup.controls.ProvinceId.invalid">
                        {{getErrorMessage('ProvinceId')}}
                      </span>
                    </div>
                  </div> -->

                  
                  <div class="col-md-4">
                      <div class="form-group">
                        <label>Region</label>
                       
                        <ng-multiselect-dropdown  
                        [placeholder]="'Select one'"
                        [data]="regionKeyPair"
                        [settings]="regionDropdownSettings"
                        formControlName="RegionId"
                        [(ngModel)]="selectedRegionInfo"
                        (onSelect)="getRegionValue($event)">
                      </ng-multiselect-dropdown>
                        <span class="help-block" *ngIf="formGroup.controls.RegionId.invalid">
                          {{getErrorMessage('RegionId')}}
                        </span>
                      </div>
                    </div>
                  <!-- <div class="col-md-4">
                    <div class="form-group">
                      <label>Region</label>
                      <select formControlName="RegionId" class="form-control">
                        <option selected value="">Select one</option>
                        <option *ngFor="let region of regionKeyPair" [value]="region.Value">
                          {{region.Text}}
                        </option>
                      </select>
                      <span class="help-block" *ngIf="formGroup.controls.RegionId.invalid">
                        {{getErrorMessage('RegionId')}}
                      </span>
                    </div>
                  </div> -->
              <div class="col-md-4">
                <div class="form-group">
                  <label>Name</label>
                  <input type="text" formControlName="Name" class="form-control input-sm" placeholder="Enter City name">
                  <span class="help-block" *ngIf="formGroup.controls.Name.invalid">
                    {{getErrorMessage('Name')}}
                  </span>
                </div>
              </div>
              
            </div>

          </div>
          <div class="box-footer">
              
              <button type="submit" [disabled]="formGroup.invalid" class="btn btn-success pull-right">Update</button>
          </div>
        </div>
      </form>
      <ngx-ui-loader></ngx-ui-loader>
    </div>
  </section>
