<section class="content">
    <section class="content-header">
        <h1>
          CHAMBER BAY EDIT
        </h1>
        <ol class="breadcrumb">
          <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
          <li><a routerLink="[this.routesList.GODOWN_SHELF_LISTING]">Chamber Bay</a></li>
          <li class="active">Edit</li>
        </ol>
      </section>
    <div col-md-12>
      <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="updateGodownShelf(formGroup.value)">
        <div class="box box-primary">
          <div class="box-header with-border">
            <div class="form-group  pull-right">
                <button type="button" (click)="redirectToGodownShelfList()" class="btn-wms">Chamber Bay Listing</button>
            </div>
          </div>
          <div class="box-body">
            <div class="col-md-12">
              <div class="col-md-4">
                <div class="form-group">
                  <label>Warehouse</label>
                  <ng-multiselect-dropdown [placeholder]="'Select one'" [data]="warehouseKeyPair" [settings]="warehouseDropdownSettings"
                    formControlName="WarehouseId" (onSelect)="getGodownKeyPair($event)">
                  </ng-multiselect-dropdown>
                </div>
                <span class="help-block" *ngIf="!this.selectedWarehouseId">
                  Required
                </span>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Chamber</label>
                  <ng-multiselect-dropdown [placeholder]="'Select one'" [data]="godownKeyPair" [settings]="godownDropdownSettings"
                    formControlName="GodownId" (onSelect)="getGodownRowKeyPair($event)">
                  </ng-multiselect-dropdown>
                  <span class="help-block" *ngIf="!this.selectedGodownId">
                    Required
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Chamber Aisle</label>
                  <ng-multiselect-dropdown [placeholder]="'Select one'" [data]="godownRowKeyPair"
                    [settings]="godownRowDropdownSettings" 
                    formControlName="GodownRowId" (onSelect)="getGodownRowValue($event)">
                  </ng-multiselect-dropdown>
                  <span class="help-block" *ngIf="!this.selectedGodownRowId">
                    Required
                  </span>
                </div>
              </div>
            </div>

            <div class="col-md-12">
              <div class="col-md-4">
                <div class="form-group">
                  <label>Chamber Rack</label>
                  <ng-multiselect-dropdown [placeholder]="'Select one'" [data]="godownRackKeyPair"
                    [settings]="godownRackDropdownSettings" formControlName="GodownRackId" (onSelect)="onGodownRackChange($event)">
                  </ng-multiselect-dropdown>
                  <span class="help-block" *ngIf="!this.selectedGodownRack || !selectedGodownRack['Id']">
                    Required
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Name</label>
                  <input type="text" formControlName="Name" class="form-control input-sm" placeholder="Enter Bay Name">
                  <span class="help-block" *ngIf="formGroup.controls.Name.invalid">
                    {{getErrorMessage('Name')}}
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Alias</label>
                  <input type="text" formControlName="Alias" class="form-control input-sm" placeholder="Enter Bay Alias">
                  <span class="help-block" *ngIf="formGroup.controls.Alias.invalid">
                    {{getErrorMessage('Alias')}}
                  </span>
                </div>
              </div>
            </div>

            <div class="col-md-12">
              <div class="col-md-4">
                <div class="form-group">
                  <label>Width</label>
                  <input type="number" formControlName="Width" class="form-control input-sm">
                  <span class="help-block" *ngIf="formGroup.controls.Width.invalid">
                    {{getErrorMessage('Width')}}
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Height</label>
                  <input type="number" formControlName="Height" class="form-control input-sm">
                  <span class="help-block" *ngIf="formGroup.controls.Height.invalid">
                    {{getErrorMessage('Height')}}
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Depth</label>
                  <input type="number" formControlName="Depth" class="form-control input-sm">
                  <span class="help-block" *ngIf="formGroup.controls.Depth.invalid">
                    {{getErrorMessage('Depth')}}
                  </span>
                </div>
              </div>
            </div>

          </div>
          <div class="box-footer">
              <button type="submit" [disabled]="formGroup.invalid" class="btn btn-success pull-right">Update</button>
          </div>
        </div>
      </form>
      <ngx-ui-loader></ngx-ui-loader>
    </div>
  </section>
