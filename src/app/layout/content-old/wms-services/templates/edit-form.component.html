<section class="content-header">
  <h1>
    WMS SERVICE EDIT
  </h1>
  <ol class="breadcrumb">
    <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
    <li><a routerLink="[this.routesList.WMS_SERVICE_LISTING]">Wms Services</a></li>
    <li class="active">Create</li>
  </ol>
</section>
<section class="content">
    <div col-md-12>
      <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="updateWmsService(formGroup.value)">
        <div class="box box-primary">
          <div class="box-header with-border">
            <div class="col-md-12">
              <!-- <div class="col-md-6">
                <div class="pull-left">
                    <div class="col-md-6 toggle-label ">
                        <span *ngIf="status == true">
                          <b>Active</b>
                        </span>
                        <span *ngIf="status == false">
                          <b>InActive</b>
                        </span>
                      </div>
                      <div class="col-md-6">
                        <ui-switch switchColor="#fcfcfc" [checked]="status == true" (change)="onStatusChange($event)"></ui-switch>
                      </div>
                </div>
              </div> -->
              <div class="col-md-12">
                <div class="pull-right">
                    <button type="button" (click)="redirectToWmsList()" class="btn-wms">WMS Service Listing</button>
                </div>
              </div>
            </div>
          </div>
          <div class="box-body">
            <div class="col-md-12">
              <div class="col-md-4">
                <div class="form-group">
                  <label>Service Name</label>
                  <input type="text" formControlName="ServiceName" class="form-control" placeholder="Enter Service Name">
                  <span class="help-block" *ngIf="formGroup.controls.ServiceName.invalid">
                    {{getErrorMessage('ServiceName')}}
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Service Type</label>
                  <input type="text" formControlName="ServiceType" class="form-control" placeholder="Enter Service Type">
                  <span class="help-block" *ngIf="formGroup.controls.ServiceType.invalid">
                    {{getErrorMessage('ServiceType')}}
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                  <div class="form-group">
                      <label>Unit Of Measurement</label>
                    <select formControlName="UnitOfMeasurement" class="form-control">
                      <option selected value="">Select one</option>
                      <option *ngFor="let unit of unitKeyPair"   [value]="unit.Value" >
                        {{unit.Text}}
                        
                      </option>
                    </select>
                    <span class="help-block" *ngIf="formGroup.controls.UnitOfMeasurement.invalid">
                      {{getErrorMessage('UnitOfMeasurement')}}
                    </span>
                  </div>
                </div>
            </div>
          </div>
          <div class="box-footer">
              <button type="submit" [disabled]="formGroup.invalid" class="btn btn-success pull-right">Update</button>
          </div>
        </div>
      </form>
    </div>
  </section>
