
<section class="content">
  <section class="content-header">
      <h1>
        AREA CREATE
      </h1>
      <ol class="breadcrumb">
        <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
        <li><a routerLink="[this.routesList.AREA_LISTING]">Area</a></li>
        <li class="active">Create</li>
      </ol>
    </section>
  <div col-md-12>
    <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="createArea(formGroup.value)">
      <div class="box box-primary">
        <div class="box-header with-border">
          <div class="form-group  pull-right">
              <button type="button" (click)="redirectToAreaList()" class="btn-wms">Area Listing</button>

          </div>
        </div>
        <div class="box-body">
          <div class="col-md-12">

            <div class="col-md-4">
                <div class="form-group">
                  <label>City</label>
                 
                  <ng-multiselect-dropdown  
                  [placeholder]="'Select one'"
                  [data]="cityKeyPair"
                  [settings]="cityDropdownSettings"
                  formControlName="ProvinceId"
                  (onSelect)="getProvinceValue($event)">
                </ng-multiselect-dropdown>
                  <span class="help-block" *ngIf="formGroup.controls.ProvinceId.invalid">
                    {{getErrorMessage('ProvinceId')}}
                  </span>
                </div>
              </div>
            <div class="col-md-4">
                <div class="form-group">
                  <label>Area Name</label>
                  <input type="text" formControlName="Name" class="form-control input-sm" placeholder="Enter area name">
                  <span class="help-block" *ngIf="formGroup.controls.Name.invalid">
                    {{getErrorMessage('Name')}}
                  </span>
                </div>
              </div>
            <div class="col-md-4">
              <div class="form-group">
                <div class="form-group shipment-item-add">
                  <button style="margin-top:20px" type="button" id="add" class="btn btn-wms" (click)="addItemIntoItemPostList()">
                    Add Item
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-12">
            <div class="row">
                <div class="col-sm-12 table-responsive">
                  <table class="table table-bordered table-hover" role="grid">
                    <thead>
                      <tr role="row">
                        <th>
                          City
                        </th>
                        <th>
                          Area
                        </th>
                        <th>
                          Action
                        </th>
         
                      </tr>
                    </thead>
                    <tbody>
                      <tr role="row" *ngFor="let Item of itemListToPost">
        
                        <!-- <td>{{Item.WareHouseId}}</td>
                        <td>{{Item.ItemInformationId}}</td>                  
                        <td>{{Item.SNno}}</td>
                        <td>{{Item.Location}}</td>
                        <td>{{Item.ReceivedQuantity}}</td> -->
                        
        
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
               </div>

        </div>
        <div class="box-footer">
            <button type="submit" [disabled]="formGroup.invalid" class="btn btn-success pull-right">Add</button>
        </div>
      </div>
    </form>
    <ngx-ui-loader></ngx-ui-loader>
  </div>
</section>
