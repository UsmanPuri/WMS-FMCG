
<section class="content">
    <section class="content-header">
        <h1>
          Region CREATE
        </h1>
        <ol class="breadcrumb">
          <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
          <li><a routerLink="[this.routesList.REGION_LISTING]">Region</a></li>
          <li class="active">Create</li>
        </ol>
      </section>
    <div col-md-12>
      <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="createRegion(formGroup.value)">
        <div class="box box-primary">
          <div class="box-header with-border">
            <div class="form-group  pull-right">
                <button type="button" (click)="redirectToRegionList()" class="btn-wms">Region Listing</button>

            </div>
          </div>
          <div class="box-body">
            <div class="col-md-12">
              <!-- <div class="col-md-4">
                <div class="form-group">
                  <label>Province</label>
                  <select formControlName="ProvinceId" class="form-control">
                    <option selected value="">Select one</option>
                    <option *ngFor="let prov of provencesKeyPair" [value]="prov.Value">
                      {{prov.Text}}
                    </option>
                  </select>
                  <span class="help-block" *ngIf="formGroup.controls.ProvinceId.invalid">
                    {{getErrorMessage('ProvinceId')}}
                  </span>
                </div>
              </div> -->

              <div class="col-md-4">
                  <div class="form-group">
                    <label>Province</label>
                   
                    <ng-multiselect-dropdown  
                    [placeholder]="'Select one'"
                    [data]="provencesKeyPair"
                    [settings]="provinceDropdownSettings"
                    formControlName="ProvinceId"
                    (onSelect)="getProvinceValue($event)">
                  </ng-multiselect-dropdown>
                    <span class="help-block" *ngIf="formGroup.controls.ProvinceId.invalid">
                      {{getErrorMessage('ProvinceId')}}
                    </span>
                  </div>
                </div>
              <div class="col-md-4">
                  <div class="form-group">
                    <label>Region Name</label>
                    <input type="text" formControlName="Name" class="form-control input-sm" placeholder="Enter region name">
                    <span class="help-block" *ngIf="formGroup.controls.Name.invalid">
                      {{getErrorMessage('Name')}}
                    </span>
                  </div>
                </div>
              <div class="col-md-4">
                <div class="form-group">
                  
                </div>
              </div>
            </div>

          </div>
          <div class="box-footer">
              <button type="submit" [disabled]="formGroup.invalid" class="btn btn-success pull-right">Add</button>
          </div>
        </div>
      </form>
    </div>
  </section>
