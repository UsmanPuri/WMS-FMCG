<section class="content">
    <section class="content-header">
        <h1>
          SKU CATEGORY CREATE
        </h1>
        <ol class="breadcrumb">
          <li><a href="#"><i class="fa fa-dashboard"></i> Home</a></li>
          <li><a routerLink="[this.routesList.ITEM_CATEGORY_LISTING]">SKU Category</a></li>
          <li class="active">Create</li>
        </ol>
      </section>
    <div col-md-12>
      <form name="formGroup" [formGroup]="formGroup" novalidate (ngSubmit)="updateItemCategory(formGroup.value)">
        <div class="box box-primary">
          <div class="box-header with-border">
            <div class="form-group  pull-right">
                <button type="button" (click)="redirectToItemCategoriesList()" class="btn-wms">SKU Category Listing</button>
            </div>
          </div>
          <div class="box-body">
            <div class="col-md-12">
                <!-- <div class="col-md-4">
                    <div class="form-group">
                        <label>Customer</label>
                        <ng-multiselect-dropdown  
                        [placeholder]="'Select one'"
                        [data]="customerKeyPair"
                        [settings]="customerDropdownSettings"
                        (onDeSelect)="onCustomerDeSelect($event)"
                        (onSelect)="customerChange($event)">
                      </ng-multiselect-dropdown>
                      </div>
                  </div> -->
              <div class="col-md-4">
                <div class="form-group">
                  <label>Name</label>
                  <input type="text" formControlName="Name" class="form-control input-sm" placeholder="Enter Name">
                  <span class="help-block" *ngIf="formGroup.controls.Name.invalid">
                    {{getErrorMessage('Name')}}
                  </span>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group">
                  <label>Description</label>
                  <input type="text" formControlName="Description" class="form-control input-sm" placeholder="Enter Description">
                  <span class="help-block" *ngIf="formGroup.controls.Description.invalid">
                    {{getErrorMessage('Description')}}
                  </span>
                </div>
              </div>
            </div>
            <!-- <div class="col-md-12">
                <div class="col-md-4">
                    <div class="form-group">
                        <label>SKU Category Code</label>
                        <input type="text" formControlName="ItemCategoryCode" class="form-control input-sm" readonly placeholder="Code">
                      </div>
                  </div>
              <div class="col-md-8">
               
              </div>
            </div> -->
          </div>
          <div class="box-footer">
              <button type="submit" [disabled]="formGroup.invalid" class="btn btn-success pull-right">Update</button>
          </div>
        </div>
      </form>
    </div>
  </section>
