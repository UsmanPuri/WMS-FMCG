<section class="content">
    <section class="content-header">
        <h1>
          CITY LISTING
          <button class="btn-wms-head" (click)="redirectToCreateCity()"><i class="fa fa-plus-circle"></i> </button>
        </h1>
        <ol class="breadcrumb">
          <li><a href="#"><i class=""></i> Home</a></li>
          <li><a routerLink="[this.routesList.CITY_LISTING]">City</a></li>
          <li class="active">Listing</li>
        </ol>
      </section>

      <div class="pull-right">
        <button class="btn-excel" (click)="exportServiceAsExcel()"><i class="fa fa-file-excel-o"></i></button>
      </div>
  <div class="row">
    <div class="col-xs-12">
      <div class="box box-solid">
        <div class="box-header">
          <!-- <h3 class="box-title">Hover Data Table</h3> -->
        </div>
        <!-- /.box-header -->
        <div class="box-body">
          <div id="example2_wrapper" class="dataTables_wrapper form-inline dt-bootstrap">
            <div class="row">
              <div class="col-sm-12 table-responsive">
                <table class="table table-bordered table-hover dataTable" role="grid">
                  <thead>
                    <tr role="row">
                      <th>Sr.</th>
                      <th>Province</th>
                      <th>Region</th>
                      <th>Zone</th>
                      <th>Name</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr role="row" *ngFor="let city of cityList; let i = index">
                      <td>{{i+1}}</td>
                      <td>{{city.AML_Province.Name}}</td>
                      <td>{{city.AML_Region.Name}}</td>
                      <td>{{city.AML_Zone.ZoneName}}</td>
                      <td>{{city.Name}}</td>
                      <td>
                          <span *ngIf="IsStatisActive(city.StatusId); else inactive_span" class="label label-success">Active</span>
                          <ng-template #inactive_span>  <span class="bg-red label">In Active</span></ng-template>
                      </td>
                      <td>
                        <button type="button" id="update" class="editBtn btn-warning" (click)="Edit(city.CityId)"><i
                            class="fa fa-edit"></i></button>
                      </td>
                    </tr>
                  </tbody>
                </table>
                <ngx-ui-loader></ngx-ui-loader>
              </div>
            </div>
     
          </div>
        </div>
        <!-- /.box-body -->
      </div>
      <!-- /.box -->
    </div>
    <!-- /.col -->
  </div>
  <!-- /.row -->
</section>
